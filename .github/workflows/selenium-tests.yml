name: Selenium Test Suite

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Step 1 - Download your repo code into the VM
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # Step 2 - Install Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 - Install Google Chrome browser
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # Step 4 - Verify Chrome installed correctly
      - name: Verify Chrome version
        run: google-chrome --version

      # Step 5 - Cache Maven dependencies (speeds up future runs)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 6 - Run your Selenium tests
      - name: Run Selenium tests
        env:
          CI: true               # Your BaseTest checks this ✅
        run: mvn clean test
        continue-on-error: true  # Still upload reports even if tests fail

      # Step 7 - Upload Extent HTML report
      - name: Upload test reports
        uses: actions/upload-artifact@v4.6.2
        if: always()             # Always runs, even if tests failed
        with:
          name: extent-reports
          path: reports/

      # Step 8 - Upload screenshots on failure
      - name: Upload screenshots
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore